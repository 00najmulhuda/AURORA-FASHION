<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Product Details | AURORA Fashion</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <!-- Announcement Bar -->
    <div class="announcement-bar">
        FREE SHIPPING ON ORDERS ABOVE ₹1999
    </div>

    <!-- Navbar -->
    <nav class="navbar">

        <div class="logo">
            AURORA
        </div>

        <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li><a href="shop.html">SHOP</a></li>
            <li><a href="about.html">ABOUT</a></li>
            <li><a href="contact.html">CONTACT</a></li>
        </ul>

        <div class="nav-icons">
            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-regular fa-user"></i>
            <i class="fa-solid fa-bag-shopping"></i>
        </div>

    </nav>

    <!-- Product Section Start -->

    <section class="product-details">

    <div class="product-container">

        <!-- Left Side Images -->

        <div class="product-gallery">

            <img src="image/product/product-main.jpg"
                alt="Product"
                class="main-product-image"
                id="mainImage">

            <div class="thumbnail-images">

                <img src="image/product/thumb1.jpg"
                    alt=""
                    class="thumb active-thumb">

                <img src="image/product/thumb2.jpg"
                    alt=""
                    class="thumb">

                <img src="image/product/thumb3.jpg"
                    alt=""
                    class="thumb">

                <img src="image/product/thumb4.jpg"
                    alt=""
                    class="thumb">

            </div>

        </div>

        <!-- Right Side Product Info -->

        <div class="product-info">

            <h1 class="product-title" id="productTitle">
                        Product Name
            </h1>

            <div class="product-rating">
                ★★★★★
                <span>(124 Reviews)</span>
            </div>

            <div class="product-price" id="productPrice">
              ₹0
            </div>

            <p class="product-description" id="productDescription">
             Description
            </p>

            <!-- Size -->

            <div class="product-option">

                <h4>Size</h4>

                <div class="sizes">

                    <button>S</button>
                    <button>M</button>
                    <button>L</button>
                    <button>XL</button>

                </div>

            </div>

            <!-- Color -->

            <div class="product-option">

                <h4>Color</h4>

                <div class="colors">

                    <span class="color beige"></span>
                    <span class="color black"></span>
                    <span class="color gray"></span>

                </div>

            </div>

            <!-- Quantity -->

            <div class="product-option">

                <h4>Quantity</h4>

                <div class="quantity-box">

                    <button id="minusBtn">-</button>

                    <input type="text"
                        value="1"
                        id="quantityInput">

                    <button id="plusBtn">+</button>

                </div>

            </div>

            <!-- Buttons -->

            <div class="product-actions">

                <button class="add-cart-btn">
                    Add To Cart
                </button>

                <button class="buy-btn">
                    Buy Now
                </button>

            </div>

        </div>

    </div>

</section>

    <!-- Product Section End -->

    <section class="product-features">

    <div class="feature-card">
        <i class="fa-regular fa-gem"></i>
        <h4>Premium Quality</h4>
        <p>Finest materials</p>
    </div>

    <div class="feature-card">
        <i class="fa-solid fa-truck"></i>
        <h4>Fast Delivery</h4>
        <p>Across India</p>
    </div>

    <div class="feature-card">
        <i class="fa-solid fa-arrow-rotate-left"></i>
        <h4>Easy Returns</h4>
        <p>30-day policy</p>
    </div>

    <div class="feature-card">
        <i class="fa-solid fa-lock"></i>
        <h4>Secure Payment</h4>
        <p>100% protected</p>
    </div>

</section>

    <script src="js/main.js"></script>

</body>

</html>
